spring.application.name=backend
# ===============================
# Database Configuration (Supabase / PostgreSQL)
# ===============================
# เปลี่ยน YOUR_DB_HOST และ YOUR_PASSWORD ตามของ Supabase คุณ
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true&prepareThreshold=0}
spring.datasource.username=${DATABASE_USERNAME:postgres.nsvtahebxqrkrjzqcqwk}
spring.datasource.password=${DATABASE_PASSWORD:Yokky569/*-+}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
# ให้ Spring Boot สร้างตารางใน Database ให้อัตโนมัติ (update)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ตั้งค่า Port ของ Server
server.port=${PORT:8080}

# ===============================
# Connection Pool (Fix for Supabase)
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# ===============================
# PgBouncer Compatibility
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=0